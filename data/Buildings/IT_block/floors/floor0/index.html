<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>IT Block – Floor 0 Navigation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top-bar">
    <h1>IT Block – Ground Floor Navigation</h1>
    <span class="subtitle">Floor 0 · A* Path Finder</span>
  </header>

  <main class="layout">
    <!-- LEFT: MAP -->
    <section class="map-panel">
      <div id="map-container">
        <!-- Floor map -->
        <img
          id="floor-map"
          src="floormap_0.jpg"
          alt="IT Block Ground Floor Map"
        />

        <!-- Path overlay -->
        <svg id="path-overlay"></svg>
      </div>
      <div class="legend">
        <span class="legend-item">
          <span class="legend-node normal"></span> Node
        </span>
        <span class="legend-item">
          <span class="legend-node on-path"></span> Path Node
        </span>
        <span class="legend-item">
          <span class="legend-node start"></span> Start
        </span>
        <span class="legend-item">
          <span class="legend-node end"></span> End
        </span>
      </div>
    </section>

    <!-- RIGHT: CONTROLS -->
    <section class="controls-panel">
      <div class="card">
        <h2>Choose Route</h2>
        <div class="field-row">
          <label for="startNode">Start</label>
          <select id="startNode"></select>
        </div>
        <div class="field-row">
          <label for="endNode">Destination</label>
          <select id="endNode"></select>
        </div>
        <button id="findPathBtn">Find Shortest Path</button>
        <button id="clearPathBtn" class="secondary">Clear</button>
        <p class="hint">
          Tip: pick any two rooms, labs, or corridor nodes to see the route.
        </p>
      </div>

      <div class="card">
        <h2>Path Details</h2>
        <div id="path-summary" class="path-summary">
          Select a start and destination.
        </div>
        <div id="path-steps" class="path-steps"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <small>Campus Navigation · IT Block Ground Floor</small>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
