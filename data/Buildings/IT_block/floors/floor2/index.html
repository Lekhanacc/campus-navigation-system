<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>IT Block – Second Floor Navigation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="top-bar">
  <h1>IT Block – Second Floor Navigation</h1><br>
  <span class="subtitle">Floor 2 · A* Path Finder</span>
</header>

<main class="layout">

  <!-- LEFT: MAP -->
  <section class="map-panel">
    <div id="map-container">
    <img id="floor-map" src="photos/floormap_2.jpeg" alt="IT Block Second Floor Map">
      <svg id="path-overlay"></svg>
    </div>

    <div class="legend">
      <span class="legend-item"><span class="legend-dot node"></span> Node</span>
      <span class="legend-item"><span class="legend-dot path"></span> Path Node</span>
      <span class="legend-item"><span class="legend-dot start"></span> Start</span>
      <span class="legend-item"><span class="legend-dot end"></span> End</span>
    </div>
  </section>

  <!-- RIGHT: CONTROLS -->
  <section class="controls-panel">

    <div class="card">
      <h2>Choose Route</h2>

      <div class="field-row">
        <label for="startNode">Start</label>
        <select id="startNode"></select>
      </div>

      <div class="field-row">
        <label for="endNode">Destination</label>
        <select id="endNode"></select>
      </div>

      <div class="button-row">
        <button id="findPathBtn">Find Shortest Path</button>
        <button id="clearPathBtn" class="secondary">Clear</button>
      </div>

      <p class="hint">
        Tip: pick any two rooms, labs, or corridor nodes to see the route.
      </p>
    </div>

    <div class="card">
      <h2>Path Details</h2>

      <!-- Next floor placeholder -->
      <button id="toFloor1Btn" class="secondary" style="display:none;">
        Continue on Floor 3
      </button>

      <div id="path-summary" class="path-summary">
        Select a start and destination.
      </div>
      <div id="path-steps" class="path-steps"></div>
    </div>

  </section>
</main>

<footer class="footer">
  <small>Campus Navigation · IT Block – Second Floor</small>
</footer>

<script src="script.js" defer></script>
</body>
</html>
