<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>IT Block Navigation — Map Mode</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --map-width: 1000px;
      --map-height: 600px;
      --marker-size: 20px;
      --accent: #0078ff;
    }
    body{ font-family: Inter, Arial, sans-serif; margin:20px; color:#111;}
    header{ display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    h2{ margin:0 8px 0 0; font-size:20px; }
    .controls{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    label{ font-size:14px; }
    select, button{ padding:6px 10px; font-size:14px; }
    button{ cursor:pointer; background:var(--accent); color:white; border:none; border-radius:6px; }
    #mapArea{ margin-top:12px; display:flex; gap:18px; align-items:flex-start; flex-wrap:wrap; }
    #mapContainer{
      position:relative;
      width:var(--map-width);
      height:var(--map-height);
      border:1px solid #ddd;
      border-radius:8px;
      overflow:hidden;
      box-shadow:0 6px 18px rgba(0,0,0,0.08);
      background:#eee;
    }
    #floorMap{ width:100%; height:100%; object-fit:cover; display:block; user-select:none; -webkit-user-drag:none;}
    .svgOverlay{ position:absolute; inset:0; pointer-events:none; }
    .marker{
      position:absolute;
      width:var(--marker-size);
      height:var(--marker-size);
      background:var(--accent);
      border-radius:50%;
      transform:translate(-50%,-50%);
      box-shadow:0 2px 6px rgba(0,0,0,0.25);
      display:flex; align-items:center; justify-content:center; color:white; font-weight:600;
      font-size:11px; cursor:pointer; pointer-events:auto;
      border:2px solid #fff;
    }
    .marker.start{ background: #16a34a; }
    .marker.goal{ background: #dc2626; }
    .marker:hover{ transform:translate(-50%,-50%) scale(1.15); z-index:30; }
    #sidePanel{ width:360px; min-height:var(--map-height); border:1px solid #eee; border-radius:8px; padding:12px; box-shadow:0 6px 18px rgba(0,0,0,0.04); background:#fff; }
    #pathImages{ display:flex; flex-direction:column; gap:8px; margin-top:8px; }
    .stepImg{ display:flex; gap:8px; align-items:center; }
    .stepImg img{ width:120px; height:80px; object-fit:cover; border-radius:6px; border:1px solid #ddd; }
    .stepInfo{ font-size:13px; }
    .controlsRow{ display:flex; gap:8px; align-items:center; margin-top:8px; }
    #output{ margin-top:12px; font-family:monospace; white-space:pre-wrap; font-size:13px; color:#333; max-height:160px; overflow:auto; background:#fafafa; padding:8px; border-radius:6px; border:1px solid #eee;}
    .playback{ display:flex; gap:6px; align-items:center; margin-top:8px; }
    .btn-small{ padding:6px 8px; background:#f3f4f6; border-radius:6px; border:1px solid #e5e7eb; cursor:pointer; }
    .legend{ display:flex; gap:8px; margin-top:8px; font-size:13px; }
    .legend .item{ display:flex; gap:6px; align-items:center; }
    .legend .sw{ width:14px; height:14px; border-radius:4px; display:inline-block; }
    /* small responsive */
    @media (max-width:1150px){
      #mapContainer{ width:720px; height:430px; }
      #sidePanel{ width:320px; min-height:430px; }
    }
    @media (max-width:900px){
      #mapArea{ flex-direction:column; }
      #mapContainer{ width:100%; height:420px; }
      #sidePanel{ width:100%; min-height:auto; }
    }
  </style>
</head>
<body>
  <header>
    <h2>IT Block Navigation — Map Mode</h2>
    <div class="controls">
      <label for="startNode">Start</label>
      <select id="startNode"></select>

      <label for="goalNode">Goal</label>
      <select id="goalNode"></select>

      <button id="findPathBtn">Find Path</button>
      <button id="clearBtn" style="background:#6b7280;">Clear</button>
    </div>
  </header>

  <div id="mapArea">
    <div id="mapContainer">
      <!-- map image (make sure path exists) -->
      <img id="floorMap" src="data/Buildings/IT_block/floors/floor0/photos/floormap_0.jpeg" alt="floor map" />
      <!-- svg overlay for path -->
      <svg class="svgOverlay" id="svgOverlay" viewBox="0 0 1000 600" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g" x1="0" x2="1">
            <stop offset="0%" stop-color="#00b4d8"/>
            <stop offset="100%" stop-color="#0078ff"/>
          </linearGradient>
        </defs>
        <polyline id="pathLine" points="" fill="none" stroke="url(#g)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
      </svg>
    </div>

    <aside id="sidePanel">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <strong>Route steps & images</strong>
        <div class="legend">
          <div class="item"><span class="sw" style="background:#16a34a"></span>Start</div>
          <div class="item"><span class="sw" style="background:#dc2626"></span>Goal</div>
          <div class="item"><span class="sw" style="background:linear-gradient(90deg,#00b4d8,#0078ff)"></span>Path</div>
        </div>
      </div>

      <div id="pathImages">
        <div style="font-size:13px;color:#666;">Find a path and thumbnails will show here in order.</div>
      </div>

      <div class="playback">
        <button id="prevStep" class="btn-small">◀ Prev</button>
        <button id="nextStep" class="btn-small">Next ▶</button>
        <div id="stepCounter" style="margin-left:auto;font-size:13px;color:#444;">0 / 0</div>
      </div>

      <div id="output" aria-live="polite">Ready.</div>
    </aside>
  </div>

  <script>
  /* ----------------- Graph data ----------------- */
  const graphData = {
    nodes: [
      { id:"C_ENTRANCE", name:"Corridor Entrance", type:"corridor" },
      { id:"C_BOTTOM_MID", name:"Bottom Corridor Middle", type:"corridor" },
      { id:"C_BOTTOM_RIGHT", name:"Bottom Corridor Right", type:"corridor" },
      { id:"C_RIGHT_MID", name:"Right Corridor Middle", type:"corridor" },
      { id:"C_RIGHT_TOP", name:"Right Corridor Top", type:"corridor" },
      { id:"C_TOP_MID", name:"Top Corridor Middle", type:"corridor" },
      { id:"C_TOP_LEFT", name:"Top Corridor Left", type:"corridor" },

      { id:"ENTRANCE", name:"Entrance", type:"entrance" },
      { id:"ITLAB_01", name:"IT Lab 01", type:"lab" },
      { id:"ITLAB_02", name:"IT Lab 02", type:"lab" },
      { id:"ITLAB_03", name:"IT Lab 03", type:"lab" },
      { id:"ROOM_101", name:"Room 101", type:"classroom" },
      { id:"ROOM_102", name:"Room 102", type:"classroom" },
      { id:"ROOM_103", name:"Room 103", type:"classroom" },
      { id:"CREATIVE_ROOM", name:"Creative Room", type:"room" },
      { id:"STAFF_ROOM_01", name:"Staff Room 01", type:"staff" },
      { id:"STAFF_ROOM_02", name:"Staff Room 02", type:"staff" },
      { id:"AIML_HOD", name:"AIML HoD Room", type:"office" },
      { id:"UPS_ROOM", name:"UPS Room", type:"utility" },
      { id:"LIFT", name:"Lift", type:"lift" },
      { id:"STAIRS", name:"Staircase", type:"stairs" },
      { id:"BOYS_WASHROOM", name:"Boys Washroom", type:"washroom" },
      { id:"GIRLS_WASHROOM", name:"Girls Washroom", type:"washroom" }
    ],
    edges: [
      { from:"C_ENTRANCE", to:"C_BOTTOM_MID", cost:1 },
      { from:"C_BOTTOM_MID", to:"C_BOTTOM_RIGHT", cost:1 },
      { from:"C_BOTTOM_RIGHT", to:"C_RIGHT_MID", cost:1 },
      { from:"C_RIGHT_MID", to:"C_RIGHT_TOP", cost:1 },
      { from:"C_RIGHT_TOP", to:"C_TOP_MID", cost:1 },
      { from:"C_TOP_MID", to:"C_TOP_LEFT", cost:1 },

      { from:"ENTRANCE", to:"C_ENTRANCE", cost:1 },
      { from:"ITLAB_01", to:"C_ENTRANCE", cost:1 },
      { from:"CREATIVE_ROOM", to:"C_BOTTOM_MID", cost:1 },
      { from:"ROOM_103", to:"C_BOTTOM_MID", cost:1 },
      { from:"ITLAB_03", to:"C_BOTTOM_RIGHT", cost:1 },

      { from:"ROOM_102", to:"C_RIGHT_MID", cost:1 },
      { from:"UPS_ROOM", to:"C_RIGHT_MID", cost:1 },
      { from:"STAFF_ROOM_01", to:"C_RIGHT_TOP", cost:1 },
      { from:"LIFT", to:"C_RIGHT_TOP", cost:0.5 },
      { from:"STAIRS", to:"C_RIGHT_TOP", cost:0.5 },

      { from:"ITLAB_02", to:"C_TOP_MID", cost:1 },
      { from:"STAFF_ROOM_02", to:"C_TOP_MID", cost:1 },
      { from:"AIML_HOD", to:"C_TOP_MID", cost:1 },
      { from:"ROOM_101", to:"C_TOP_LEFT", cost:1 },
      { from:"BOYS_WASHROOM", to:"C_TOP_LEFT", cost:0.5 },
      { from:"GIRLS_WASHROOM", to:"C_TOP_LEFT", cost:0.5 }
    ]
  };

  /* ----------------- image mapping (your provided paths) -----------------
     Make sure these files exist at given locations relative to this HTML file.
  -------------------------------------------------------------------------*/
  const imageMap = {
    "AIML_HOD": "data/Buildings/IT_block/floors/floor0/photos/AI_ML_hod_dept_0.jpeg",
    "CREATIVE_ROOM": "data/Buildings/IT_block/floors/floor0/photos/creative_area_0.jpeg",
    "ITLAB_01": "data/Buildings/IT_block/floors/floor0/photos/lab_1_0.jpeg",
    "ITLAB_02": "data/Buildings/IT_block/floors/floor0/photos/lab_2_0.jpeg",
    "ITLAB_03": "data/Buildings/IT_block/floors/floor0/photos/lab_3_0.jpeg",
    "ROOM_101": "data/Buildings/IT_block/floors/floor0/photos/room_101_0.jpeg",
    "ROOM_102": "data/Buildings/IT_block/floors/floor0/photos/room_102_0.jpeg",
    "ROOM_103": "data/Buildings/IT_block/floors/floor0/photos/room_103_0.jpeg",
    "STAFF_ROOM_01": "data/Buildings/IT_block/floors/floor0/photos/staff_room1_0.jpeg",
    "STAFF_ROOM_02": "data/Buildings/IT_block/floors/floor0/photos/saff_room2_0.jpeg",
    "BOYS_WASHROOM": "data/Buildings/IT_block/floors/floor0/photos/gents_washroom_0.jpeg",
    "GIRLS_WASHROOM": "data/Buildings/IT_block/floors/floor0/photos/ladies_washroom_0.jpeg",
    "LIFT": "data/Buildings/IT_block/floors/floor0/photos/lift_0.jpeg",
    "STAIRS": "data/Buildings/IT_block/floors/floor0/photos/Stairs_0.jpeg",
    "ITLAB_01": "data/Buildings/IT_block/floors/floor0/photos/lab_1_0.jpeg",
    "ENTRANCE": "data/Buildings/IT_block/floors/floor0/photos/Corridor_first_0.jpeg",
    "C_ENTRANCE": "data/Buildings/IT_block/floors/floor0/photos/Corridor_first_0.jpeg",
    "C_BOTTOM_MID": "data/Buildings/IT_block/floors/floor0/photos/Corridor_second_0.jpeg",
    "C_BOTTOM_RIGHT": "data/Buildings/IT_block/floors/floor0/photos/Corridor_third_0.jpeg",
    "C_RIGHT_MID": "data/Buildings/IT_block/floors/floor0/photos/Corridor_fourth_0.jpeg",
    "C_RIGHT_TOP": "data/Buildings/IT_block/floors/floor0/photos/Corridor_first_0.jpeg",
    "C_TOP_MID": "data/Buildings/IT_block/floors/floor0/photos/Corridor_second_0.jpeg",
    "C_TOP_LEFT": "data/Buildings/IT_block/floors/floor0/photos/Corridor_third_0.jpeg",
    "UPS_ROOM": "data/Buildings/IT_block/floors/floor0/photos/UPS_ROOM_0.jpeg" // placeholder if you have one
  };

  /* ----------------- adjacency builder ----------------- */
  function buildGraph(data){
    const adj={};
    data.nodes.forEach(n=>adj[n.id]=[]);
    data.edges.forEach(e=>{
      adj[e.from].push({to:e.to,cost:e.cost});
      adj[e.to].push({to:e.from,cost:e.cost});
    });
    return adj;
  }
  const graph = buildGraph(graphData);

  /* ----------------- A* (heuristic=0) ----------------- */
  function aStar(graph, start, goal){
    const h = ()=>0;
    const open = new Set([start]);
    const came = {};
    const g = {}, f = {};
    Object.keys(graph).forEach(n=>{ g[n]=Infinity; f[n]=Infinity; });
    g[start]=0; f[start]=h(start);
    while(open.size){
      let current = null, best = Infinity;
      for(const n of open) if(f[n] < best){ best=f[n]; current=n; }
      if(current === goal) return { path: reconstruct(came,current), cost: g[current] };
      open.delete(current);
      for(const nb of graph[current]){
        const tentative = g[current] + nb.cost;
        if(tentative < g[nb.to]){
          came[nb.to] = current;
          g[nb.to] = tentative;
          f[nb.to] = tentative + h(nb.to);
          open.add(nb.to);
        }
      }
    }
    return { path:null, cost:Infinity };
  }
  function reconstruct(came, curr){
    const p=[curr];
    while(curr in came){ curr = came[curr]; p.unshift(curr); }
    return p;
  }

  /* ----------------- node positions on map (percent coords) -----------------
     I assigned sensible defaults (percent). Tweak them if a marker sits slightly off.
  ---------------------------------------------------------------------------*/
  const nodePos = {
    "ENTRANCE": {x:8, y:78},
    "C_ENTRANCE": {x:18,y:72},
    "C_BOTTOM_MID": {x:34,y:72},
    "C_BOTTOM_RIGHT": {x:50,y:68},
    "C_RIGHT_MID": {x:64,y:60},
    "C_RIGHT_TOP": {x:74,y:44},
    "C_TOP_MID": {x:52,y:30},
    "C_TOP_LEFT": {x:30,y:28},

    "ITLAB_01": {x:12,y:66},
    "CREATIVE_ROOM": {x:36,y:86},
    "ROOM_103": {x:36,y:82},
    "ITLAB_03": {x:50,y:86},
    "ROOM_102": {x:62,y:67},
    "UPS_ROOM": {x:62,y:74},
    "STAFF_ROOM_01": {x:75,y:56},
    "LIFT": {x:70,y:50},
    "STAIRS": {x:70,y:40},
    "ITLAB_02": {x:50,y:24},
    "STAFF_ROOM_02": {x:56,y:24},
    "AIML_HOD": {x:44,y:24},
    "ROOM_101": {x:30,y:18},
    "BOYS_WASHROOM": {x:24,y:24},
    "GIRLS_WASHROOM": {x:28,y:20}
  };

  /* ----------------- UI wiring ----------------- */
  const startSel = document.getElementById('startNode');
  const goalSel = document.getElementById('goalNode');
  const findBtn = document.getElementById('findPathBtn');
  const clearBtn = document.getElementById('clearBtn');
  const pathImagesDiv = document.getElementById('pathImages');
  const output = document.getElementById('output');
  const mapContainer = document.getElementById('mapContainer');
  const svg = document.getElementById('svgOverlay');
  const pathLine = document.getElementById('pathLine');
  const prevBtn = document.getElementById('prevStep');
  const nextBtn = document.getElementById('nextStep');
  const stepCounter = document.getElementById('stepCounter');

  // Fill selects
  graphData.nodes.forEach(n=>{
    const o1 = document.createElement('option');
    o1.value = n.id; o1.textContent = n.name + ' ('+n.id+')';
    startSel.appendChild(o1);
    const o2 = document.createElement('option');
    o2.value = n.id; o2.textContent = n.name + ' ('+n.id+')';
    goalSel.appendChild(o2);
  });
  startSel.value = 'ENTRANCE';
  goalSel.value = 'ITLAB_01';

  // Create markers
  const markers = {};
  function createMarkers(){
    // remove existing
    document.querySelectorAll('.marker').forEach(m=>m.remove());
    graphData.nodes.forEach((n, idx) => {
      const pos = nodePos[n.id];
      if(!pos) return;
      const m = document.createElement('div');
      m.className = 'marker';
      m.title = n.name + ' ('+n.id+')';
      m.dataset.id = n.id;
      m.style.left = pos.x + '%';
      m.style.top = pos.y + '%';
      m.textContent = (idx+1); // small label
      // click behavior: set start/goal with modifier
      m.addEventListener('click', (ev)=>{
        const id = m.dataset.id;
        if(ev.shiftKey){
          goalSel.value = id;
        } else if(ev.altKey){
          startSel.value = id;
        } else {
          // normal click = set start if empty else set goal
          if(!startSel.value || startSel.value === goalSel.value) startSel.value = id;
          else goalSel.value = id;
        }
        // highlight small flash
        m.animate([{ transform:'translate(-50%,-50%) scale(1.25)' }, { transform:'translate(-50%,-50%) scale(1)' }], { duration:300 });
      });
      mapContainer.appendChild(m);
      markers[n.id] = m;
    });
  }

  createMarkers();

  // Helper: update marker styles for start/goal
  function refreshMarkerStates(start, goal){
    Object.keys(markers).forEach(id=>{
      markers[id].classList.remove('start','goal');
      if(id === start) markers[id].classList.add('start');
      if(id === goal) markers[id].classList.add('goal');
    });
  }

  // Convert percent coords to SVG viewBox coordinates (svg viewBox 1000x600)
  function posToPoint(id){
    const p = nodePos[id];
    if(!p) return null;
    return { x: p.x/100 * 1000, y: p.y/100 * 600 };
  }

  // Draw polyline path
  function drawPath(path){
    if(!path || path.length === 0){ pathLine.setAttribute('points',''); return; }
    const pts = path.map(id => {
      const pt = posToPoint(id);
      return pt ? `${pt.x},${pt.y}` : null;
    }).filter(Boolean);
    pathLine.setAttribute('points', pts.join(' '));
  }

  // Show images thumbnails and set up playback
  let currentRoute = [];
  let currentIndex = 0;
  function showRouteImages(route){
    currentRoute = route.slice();
    currentIndex = 0;
    pathImagesDiv.innerHTML = '';
    if(!route || route.length===0){
      pathImagesDiv.innerHTML = '<div style="color:#666;font-size:13px;">No route.</div>';
      stepCounter.textContent = '0 / 0';
      return;
    }
    route.forEach((id, i) => {
      const wrapper = document.createElement('div');
      wrapper.className = 'stepImg';
      const img = document.createElement('img');
      img.alt = id;
      img.src = imageMap[id] || 'data/Buildings/IT_block/floors/floor0/photos/Corridor_first_0.jpeg';
      const info = document.createElement('div');
      info.className = 'stepInfo';
      info.innerHTML = `<div style="font-weight:600">${i+1}. ${getNodeName(id)}</div><div style="color:#666">${id}</div>`;
      wrapper.appendChild(img);
      wrapper.appendChild(info);
      pathImagesDiv.appendChild(wrapper);
    });
    highlightStep(0);
    stepCounter.textContent = `${currentIndex+1} / ${currentRoute.length}`;
  }

  function highlightStep(i){
    // scroll thumbnail into view and visually highlight (simple border)
    const nodes = Array.from(pathImagesDiv.querySelectorAll('.stepImg'));
    nodes.forEach((el, idx)=>{
      el.style.border = idx === i ? '2px solid var(--accent)' : 'none';
      if(idx === i) el.scrollIntoView({behavior:'smooth', block:'nearest'});
    });
    // update marker emphasis
    Object.keys(markers).forEach(id => markers[id].style.opacity = 0.45);
    currentRoute.forEach((id, idx)=>{
      if(markers[id]) markers[id].style.opacity = idx === i ? 1 : 0.85;
    });
    // move map focus (optional): we can pan by subtle zoom via CSS transforms (kept simple)
    // update counter
    stepCounter.textContent = `${i+1} / ${currentRoute.length}`;
  }

  prevBtn.addEventListener('click', ()=>{
    if(currentRoute.length === 0) return;
    currentIndex = Math.max(0, currentIndex-1);
    highlightStep(currentIndex);
  });
  nextBtn.addEventListener('click', ()=>{
    if(currentRoute.length === 0) return;
    currentIndex = Math.min(currentRoute.length-1, currentIndex+1);
    highlightStep(currentIndex);
  });

  // Utility
  function getNodeName(id){
    const n = graphData.nodes.find(x=>x.id===id);
    return n ? n.name : id;
  }

  // Button actions
  findBtn.addEventListener('click', ()=>{
    const s = startSel.value;
    const g = goalSel.value;
    if(!s || !g){ output.textContent = 'Select start and goal.'; return; }
    // compute path
    const res = aStar(graph, s, g);
    if(!res.path){ output.textContent = 'No path found.'; drawPath([]); showRouteImages([]); refreshMarkerStates(s,g); return; }
    drawPath(res.path);
    showRouteImages(res.path);
    refreshMarkerStates(s,g);
    // display JSON
    output.textContent = JSON.stringify({ start:s, goal:g, path:res.path, cost:res.cost }, null, 2);
  });

  clearBtn.addEventListener('click', ()=>{
    drawPath([]);
    showRouteImages([]);
    output.textContent = 'Cleared.';
    // reset marker opacity
    Object.values(markers).forEach(m=>m.style.opacity = 1);
    refreshMarkerStates('', '');
  });

  // allow selecting start/goal via dropdown change to refresh markers
  startSel.addEventListener('change', ()=> refreshMarkerStates(startSel.value, goalSel.value));
  goalSel.addEventListener('change', ()=> refreshMarkerStates(startSel.value, goalSel.value));

  // initial small path
  refreshMarkerStates(startSel.value, goalSel.value);

  /* ------------- Extras: make markers re-position on window resize if desired ------------- */
  // (we use percent positioning so they are responsive au
  // 
  
  
  
  
  
  
  
  
  tomatically)

  /* ------------- Quick note: How to tweak coordinates -------------
     Edit the 'nodePos' object above: values are percentages relative to map image.
     Example: nodePos['ITLAB_01'] = { x: 12, y: 66 }
  -----------------------------------------------------------------*/
  </script>
</body>
</html>
